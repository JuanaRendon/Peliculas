<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recomendador de Películas - Juana Valdez Rendon</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1> Bienvenidos al cine</h1>
            <p class="nombre"> Desarrollado por: Juana Valdez Rendon</p>
        </header>
        
        <div class="menu">
            <h2>Menú</h2>
            <p class="descripcion">
                Queremos hacer de tu visita, una experiencia más placentera. 
                Para eso, ingresa tu edad y selecciona el género que más te guste, 
                y te recomendamos tu película ideal.
            </p>

            <div class="formulario">
                <div class="campo">
                    <label for="edad">Edad:</label>
                    <input type="number" id="edad" min="1" max="120" value="20">
                </div>

                <div class="campo">
                    <label>Selecciona tu género favorito:</label>
                    <div class="generos">
                        <button class="genero-btn" data-genero="Drama"> Drama</button>
                        <button class="genero-btn" data-genero="Comedia"> Comedia</button>
                        <button class="genero-btn" data-genero="Musical"> Musical</button>
                        <button class="genero-btn" data-genero="Crimen"> Crimen</button>
                    </div>
                </div>

                <button id="recomendar-btn"> Recomendar película</button>
            </div>

            <div id="resultado" class="resultado">
                <h3>Nuestra recomendación:</h3>
                <p id="recomendacion">Selecciona un género y presiona el botón</p>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
